        // --- Core Application Logic ---

        // Utility to parse CSV text into an array of objects
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    let value = (values[j] || '').trim();
                    if (value.startsWith('"') && value.endsWith('"')) {
                        value = value.substring(1, value.length - 1);
                    }
                    obj[headers[j]] = value;
                }
                data.push(obj);
            }
            return data;
        }

        const neData = parseCSV(neCsvData);
        const pathwayData = parseCSV(pathwayCsvData);
        const pathwayMap = new Map(pathwayData.map(row => [row.Pathway, row]));

        // Populate the symptoms table
        const tableBody = document.getElementById('symptoms-table');
        neData.forEach((symptom, index) => {
            const row = document.createElement('tr');
            row.className = 'border-b border-gray-200 hover:bg-gray-50';
            
            const symptomCell = document.createElement('td');
            symptomCell.className = 'p-3';
            symptomCell.textContent = symptom.Symptom;
            
            const presentCell = document.createElement('td');
            presentCell.className = 'p-3 text-center';
            
            const input = document.createElement('input');
            input.type = 'checkbox';
            input.className = 'symptom-checkbox h-6 w-6 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer';
            input.checked = symptom.Is_Present === '1';
            input.dataset.index = index;

            presentCell.appendChild(input);
            row.appendChild(symptomCell);
            row.appendChild(presentCell);
            tableBody.appendChild(row);
        });

        // Add event listeners to buttons
        document.getElementById('analyzeBtn').addEventListener('click', analyze);
        document.getElementById('resetBtn').addEventListener('click', reset);

        function reset() {
            const checkboxes = document.querySelectorAll('.symptom-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
            });
            document.getElementById('results-container').classList.add('hidden');
        }

        function analyze() {
            // 1. Get current user inputs from checkboxes
            const currentNeData = neData.map((row, index) => {
                const isChecked = document.querySelector(`input[data-index="${index}"]`).checked;
                return {
                    ...row,
                    Is_Present: isChecked ? 1 : 0
                };
            });

            // 2. Filter for present symptoms (Is_Present == 1)
            const presentSymptoms = currentNeData.filter(s => s.Is_Present === 1);

            // 3. Get active pathways
            const activePathways = [];
            presentSymptoms.forEach(row => {
                if (row.Pathway1 && row.Pathway1.trim()) {
                    activePathways.push(row.Pathway1.trim());
                }
                if (row.Pathway2 && row.Pathway2.trim()) {
                    activePathways.push(row.Pathway2.trim());
                }
            });

            const pathwayLocations = [];
            const pathwayResultsContainer = document.getElementById('pathway-results');
            pathwayResultsContainer.innerHTML = ''; // Clear previous results

            // 4. Find affected locations for each pathway
            activePathways.forEach(pathway => {
                const pathwayRow = pathwayMap.get(pathway);
                let resultHTML = `<div class="mb-3 p-3 bg-gray-50 rounded-md">`;
                if (pathwayRow) {
                    const locations = Object.keys(pathwayRow)
                        .filter(key => key !== 'Pathway' && pathwayRow[key] === '1');
                    
                    pathwayLocations.push(new Set(locations));
                    
                    resultHTML += `<p class="font-semibold text-gray-700">路徑 '<span class="text-blue-600">${pathway}</span>' 可能影響的區域:</p>`;
                    resultHTML += `<p class="text-gray-600">${locations.join(', ') || '無'}</p>`;
                } else {
                    resultHTML += `<p class="font-semibold text-red-500">警告: 在pathway.csv中找不到路徑 '${pathway}'</p>`;
                }
                resultHTML += `</div>`;
                pathwayResultsContainer.innerHTML += resultHTML;
            });
            
            const intersectionResultContainer = document.getElementById('intersection-result');
            intersectionResultContainer.innerHTML = '';
            
            if (activePathways.length > 0 && pathwayLocations.length === 0) {
                 intersectionResultContainer.innerHTML = `<p class="text-lg font-bold">已勾選症狀，但在pathway.csv中找不到任何對應的路徑。</p>`;
                 document.getElementById('results-container').classList.remove('hidden');
                 return;
            } else if (pathwayLocations.length === 0) {
                intersectionResultContainer.innerHTML = `<p class="text-lg font-bold">請先勾選症狀再進行分析。</p>`;
                document.getElementById('results-container').classList.remove('hidden');
                return;
            }

            // 5. Calculate intersection
            let intersectionResult = new Set(pathwayLocations[0]);
            for (let i = 1; i < pathwayLocations.length; i++) {
                intersectionResult = new Set([...intersectionResult].filter(x => pathwayLocations[i].has(x)));
            }

            let intersectionHTML = `<h3 class="text-lg font-bold text-gray-800">共同影響的區域 (交集):</h3>`;
            if (intersectionResult.size > 0) {
                intersectionHTML += `<p class="p-3 bg-green-100 text-green-800 rounded-md font-semibold">${[...intersectionResult].join(', ')}</p>`;
            } else {
                intersectionHTML += `<p class="p-3 bg-yellow-100 text-yellow-800 rounded-md">沒有交集，請根據上方路徑自行校正</p>`;
            }
            intersectionResultContainer.innerHTML = intersectionHTML;

            // 6. Handle special conditions
            const specialConditionsContainer = document.getElementById('special-conditions');
            specialConditionsContainer.innerHTML = '';
            let specialHTML = `<h3 class="text-lg font-bold text-gray-800 mt-4">提醒:</h3><div class="space-y-2">`;
            let hasSpecialCondition = false;

// --- lacunar infarction start ---
{
                const singlePathway = activePathways[0];
                // 定義關鍵字以識別不同類型的路徑
                const motorKeywords = ['motor'];
                const sensoryKeywords = ['sensory'];
                const dysmetriaKeywords = ['ataxia'];
                
                const lowerCasePathway = singlePathway.toLowerCase();
                
                // 檢查路徑是否符合任何類別
                const isMotor = motorKeywords.some(kw => lowerCasePathway.includes(kw));
                const isSensory = sensoryKeywords.some(kw => lowerCasePathway.includes(kw));
                const isDysmetria = dysmetriaKeywords.some(kw => lowerCasePathway.includes(kw));

                // 「純」症候群意味著它只屬於一個類別，而不屬於其他類別
                const isPurelyMotor = isMotor && !isSensory && !isDysmetria;
                const isPurelySensory = isSensory && !isMotor && !isDysmetria;
                const isPurelyDysmetria = isDysmetria && !isMotor && !isSensory;

                if (isPurelyMotor || isPurelySensory || isPurelyDysmetria) {
                    specialHTML += `<p class="p-3 bg-blue-100 text-blue-800 rounded-md">💡 單一路徑影響 (純運動、純感覺或純運動失調)，可能為 lacunar infarction</p>`;
                    hasSpecialCondition = true;
                }
            }
            // --- lacunar infarction end ---

            const containsAphasiaApraxia = activePathways.some(p => p.toLowerCase().includes('aphasia') || p.toLowerCase().includes('apraxia'));
            const intersectionInMCA = [...intersectionResult].some(loc => loc.toLowerCase().includes('mca territory'));
            if (containsAphasiaApraxia && intersectionInMCA) {
                 specialHTML += `<p class="p-3 bg-blue-100 text-blue-800 rounded-md">💡 包含 aphasia/apraxia 且交集在 MCA 區域，請留意大面積中風。</p>`;
                 hasSpecialCondition = true;
            }

            
            if (!hasSpecialCondition) {
                specialHTML += `<p class="text-gray-500">無特殊提醒。</p>`;
            }

            specialHTML += `</div>`;
            specialConditionsContainer.innerHTML = specialHTML;

            // Show the results container
            document.getElementById('results-container').classList.remove('hidden');
        }
    </script>
